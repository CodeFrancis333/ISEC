<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You | Ingeniare SEC PH</title>
    <link rel="icon" type="image/png" href="/Ingeniare-Logo.png" />
    <style>
      :root {
        --isec-bg: #0b1117;
        --isec-surface: #f7f1e6;
        --isec-text: #1f252c;
        --isec-gold: #f3cb49;
        --isec-maroon: #6f1d1b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(243, 203, 73, 0.18), transparent 30%),
          linear-gradient(180deg, #101820 0%, var(--isec-bg) 100%);
        color: var(--isec-text);
        font-family: Georgia, "Times New Roman", serif;
      }

      .card {
        width: min(720px, 100%);
        background: var(--isec-surface);
        border: 1px solid rgba(243, 203, 73, 0.3);
        border-radius: 20px;
        padding: 40px 32px;
        text-align: center;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--isec-maroon);
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2rem, 4vw, 3rem);
      }

      p {
        margin: 0 auto;
        max-width: 46ch;
        line-height: 1.6;
        font-size: 1.05rem;
      }

      .actions {
        margin-top: 28px;
      }

      .button {
        display: inline-block;
        padding: 14px 22px;
        border-radius: 999px;
        background: var(--isec-maroon);
        color: #fff;
        text-decoration: none;
        font-weight: 700;
      }

      .button:hover {
        background: #591715;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">Inquiry Received</p>
      <h1>Thank You</h1>
      <p>
        Your inquiry has been submitted successfully. We will review your
        message and get back to you through the email address you provided.
      </p>
      <div class="actions">
        <a class="button" href="/">Back to Home</a>
      </div>
    </main>
  </body>
</html>
