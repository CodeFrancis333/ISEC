<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You | Ingeniare SEC PH</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/Ingeniare-Logo.png" />
    <meta name="robots" content="noindex,nofollow" />
    <link rel="canonical" href="https://www.ingeniare-sec.com/thank-you" />
    <style>
      :root {
        --isec-bg: #ffffff;
        --isec-surface: #ffffff;
        --isec-text: #111111;
        --isec-muted: #4b4b4b;
        --isec-border: #d9d9d9;
        --isec-button: #590808;
        --isec-gold: #c9932f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #ffffff;
        color: var(--isec-text);
        font-family: Georgia, "Times New Roman", serif;
      }

      .card {
        width: min(720px, 100%);
        background: var(--isec-surface);
        border: 1px solid var(--isec-border);
        border-radius: 12px;
        padding: 40px 32px;
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 2.6rem);
        line-height: 1.1;
        letter-spacing: 0;
        color: var(--isec-gold);
      }

      p {
        margin: 0 auto;
        max-width: 42ch;
        line-height: 1.65;
        font-size: 1rem;
        color: var(--isec-muted);
      }

      .contact {
        margin-top: 18px;
        font-size: 0.95rem;
        color: var(--isec-text);
      }

      .contact strong {
        font-weight: 600;
      }

      .actions {
        margin-top: 24px;
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .button {
        display: inline-block;
        padding: 14px 22px;
        border-radius: 999px;
        background: var(--isec-button);
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        border: 1px solid var(--isec-button);
      }

      .button-outline {
        background: transparent;
        border: 1px solid var(--isec-gold);
        color: var(--isec-gold);
      }

      .button:hover {
        color: #fff;
      }

      .button-outline:hover {
        background: #fffaf0;
        color: #8f6a12;
        border-color: #8f6a12;
      }

      @media (max-width: 640px) {
        .card {
          padding: 36px 22px;
        }

        .actions {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Thank you.</h1>
      <p>
        Your inquiry has been received. We&apos;ll get back to you through the
        contact details you provided.
      </p>
      <p class="contact">
        For urgent concerns: <strong>ingeniare.idc@gmail.com</strong> or
        <strong> +63 951 235 9772</strong>
      </p>
      <div class="actions">
        <a class="button" href="/">Back to Home</a>
        <a class="button button-outline" href="/contact">Send Another Inquiry</a>
      </div>
    </main>
  </body>
</html>
